<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Peça as melhores pizzas de Osasco no precinho de segunda a quinta por R$ 22,99. Entrega rápida, ingredientes premium e pagamento no Pix." />
    <meta name="author" content="Pizza" />
    <title>Pizza — Delivery de Pizza em Osasco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" />
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (!theme) theme = 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0A0A0A' : '#F5F5F0');
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
